{% extends "base.html" %}
{% block title %}登录 - 固件管理系统{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">🔐 用户登录</h1>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="输入密码" required>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> 记住登录状态
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-block">登 录</button>
        </form>
        <div class="auth-footer">
            还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}
