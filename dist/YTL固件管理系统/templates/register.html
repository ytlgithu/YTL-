{% extends "base.html" %}
{% block title %}注册 - 固件管理系统{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">📝 用户注册</h1>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="用于登录" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="至少6位" required>
            </div>
            <div class="form-group">
                <label for="password2">确认密码</label>
                <input type="password" id="password2" name="password2" placeholder="再输入一次" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">注 册</button>
        </form>
        <div class="auth-footer">
            已有账号？<a href="{{ url_for('login') }}">立即登录</a>
        </div>
    </div>
</div>
{% endblock %}
