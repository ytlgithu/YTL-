{% extends "base.html" %}
{% block title %}上传文件 - {{ repo.name }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>上传文件到 {{ repo.name }}</h1>
</div>

<p>当前目录：<code>{{ current_path or '/' }}</code></p>

<form method="POST" enctype="multipart/form-data" class="form-card" id="upload-form">
  <input type="hidden" name="upload_path" value="{{ current_path }}">
  
  <div class="form-group">
    <label>选择文件或文件夹</label>
    <div class="drop-zone" id="dropZone" style="cursor:pointer;">
      <div class="drop-hint">
        <p style="font-size:1.2em;">拖拽文件或文件夹到此处</p>
        <p class="small">或点击此处选择</p>
      </div>
    </div>
  </div>
  
  <input type="file" id="fileInput" multiple style="display:none">
  <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none">
  
  <p class="hint" id="statusHint"></p>

  <div id="fileList" class="upload-list"></div>

  <div class="form-group">
    <label>上传到目录（可选）</label>
    <input type="text" name="target_path_input" id="targetPathInput" value="{{ current_path }}" placeholder="如 src/drivers">
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">开始上传</button>
    {% if current_path %}
    <a href="{{ url_for('repo_view', repo_id=repo.id, subpath=current_path) }}" class="btn btn-outline">取消</a>
    {% else %}
    <a href="{{ url_for('repo_view', repo_id=repo.id) }}" class="btn btn-outline">取消</a>
    {% endif %}
  </div>
</form>
{% endblock %}

{% block extra_js %}
<script>
// 选择对话框
function showChoiceDialog() {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
    
    const dialog = document.createElement('div');
    dialog.style.cssText = 'background:#fff;border-radius:8px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.3);text-align:center;';
    dialog.innerHTML = `
      <p style="margin:0 0 20px;font-size:16px;">请选择上传类型</p>
      <div style="display:flex;gap:12px;justify-content:center;">
        <button id="btnFolder" style="padding:10px 24px;font-size:14px;border:none;border-radius:4px;cursor:pointer;background:#4a90d9;color:#fff;">📁 文件夹</button>
        <button id="btnFile" style="padding:10px 24px;font-size:14px;border:none;border-radius:4px;cursor:pointer;background:#6c757d;color:#fff;">📄 文件</button>
        <button id="btnCancel" style="padding:10px 24px;font-size:14px;border:none;border-radius:4px;cursor:pointer;background:#eee;color:#666;">取消</button>
      </div>
    `;
    
    overlay.appendChild(dialog);
    document.body.appendChild(overlay);
    
    const close = (result) => {
      document.body.removeChild(overlay);
      resolve(result);
    };
    
    document.getElementById('btnFolder').onclick = () => close('folder');
    document.getElementById('btnFile').onclick = () => close('file');
    document.getElementById('btnCancel').onclick = () => close(null);
    overlay.onclick = (e) => { if (e.target === overlay) close(null); };
  });
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const folderInput = document.getElementById('folderInput');
const fileList = document.getElementById('fileList');
const form = document.getElementById('upload-form');
const statusHint = document.getElementById('statusHint');
const submitBtn = document.getElementById('submitBtn');
let selectedFiles = [];

// 检测浏览器支持
const hasDirectoryPicker = 'showDirectoryPicker' in window;
const hasWebkitDirectory = 'webkitdirectory' in document.createElement('input');
console.log('Browser support - showDirectoryPicker:', hasDirectoryPicker, 'webkitdirectory:', hasWebkitDirectory);

// 拖拽处理
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', async e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  statusHint.textContent = '正在读取文件...';
  await handleItems(e.dataTransfer.items);
  statusHint.textContent = '已选择 ' + selectedFiles.length + ' 个文件';
  renderList();
});

// 点击拖拽区域 - 弹出选择对话框
dropZone.addEventListener('click', async () => {
  const choice = await showChoiceDialog();
  
  if (choice === 'folder') {
    // 选择文件夹
    if (hasDirectoryPicker) {
      try {
        statusHint.textContent = '请选择文件夹...';
        const dirHandle = await window.showDirectoryPicker();
        statusHint.textContent = '正在读取文件夹...';
        selectedFiles = [];
        await readDirectory(dirHandle, '');
        statusHint.textContent = '已选择 ' + selectedFiles.length + ' 个文件';
        renderList();
        return;
      } catch (e) {
        if (e.name === 'AbortError') { statusHint.textContent = ''; return; }
      }
    }
    if (hasWebkitDirectory) { folderInput.click(); return; }
    alert('您的浏览器不支持选择文件夹，请选择文件');
    fileInput.click();
  } else if (choice === 'file') {
    // 选择文件
    fileInput.click();
  }
  // choice === null 时什么都不做
});

// 普通文件选择处理
fileInput.addEventListener('change', () => {
  selectedFiles = [];
  for (const file of fileInput.files) {
    selectedFiles.push({ file, path: file.name });
  }
  statusHint.textContent = '已选择 ' + selectedFiles.length + ' 个文件';
  renderList();
});

// webkitdirectory 文件夹选择处理
folderInput.addEventListener('change', () => {
  selectedFiles = [];
  const files = folderInput.files;
  if (!files || files.length === 0) {
    statusHint.textContent = '未选择文件夹';
    return;
  }
  
  for (const file of files) {
    const relativePath = file.webkitRelativePath || file.name;
    selectedFiles.push({ file, path: relativePath });
  }
  
  statusHint.textContent = '已选择 ' + selectedFiles.length + ' 个文件';
  renderList();
});

// 递归读取目录（File System Access API）
async function readDirectory(dirHandle, path) {
  for await (const entry of dirHandle.values()) {
    if (entry.kind === 'file') {
      const file = await entry.getFile();
      selectedFiles.push({ file, path: path + entry.name });
    } else if (entry.kind === 'directory') {
      await readDirectory(entry, path + entry.name + '/');
    }
  }
}

// 处理拖拽项
async function handleItems(items) {
  selectedFiles = [];
  for (const item of items) {
    if (item.kind === 'file') {
      const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
      if (entry) {
        await traverseEntry(entry, '');
      } else {
        const f = item.getAsFile();
        selectedFiles.push({ file: f, path: f.name });
      }
    }
  }
  renderList();
}

async function traverseEntry(entry, path) {
  if (entry.isFile) {
    const file = await new Promise(r => entry.file(r));
    selectedFiles.push({ file, path: path + entry.name });
  } else if (entry.isDirectory) {
    const reader = entry.createReader();
    let entries = [];
    let batch;
    do {
      batch = await new Promise(r => reader.readEntries(r));
      entries = entries.concat(batch);
    } while (batch.length > 0);
    
    for (const e of entries) {
      await traverseEntry(e, path + entry.name + '/');
    }
  }
}

function renderList() {
  if (!selectedFiles.length) {
    fileList.innerHTML = '<p style="color:#888;">请选择文件或文件夹</p>';
    submitBtn.disabled = true;
    return;
  }
  submitBtn.disabled = false;
  
  let html = '<h4>待上传文件 (' + selectedFiles.length + ')</h4>';
  html += '<div style="max-height:300px;overflow-y:auto;"><ul>';
  let total = 0;
  for (const { file, path } of selectedFiles) {
    total += file.size;
    const sz = file.size < 1024 ? file.size+'B' : file.size < 1048576 ? (file.size/1024).toFixed(1)+'KB' : (file.size/1048576).toFixed(1)+'MB';
    html += '<li><code>' + path + '</code> <span class="size">' + sz + '</span></li>';
  }
  html += '</ul></div>';
  const totalSz = total < 1048576 ? (total/1024).toFixed(1)+'KB' : total < 1073741824 ? (total/1048576).toFixed(1)+'MB' : (total/1073741824).toFixed(2)+'GB';
  html += '<p class="total">总计: ' + totalSz + '</p>';
  fileList.innerHTML = html;
}

// 表单提交
form.addEventListener('submit', async e => {
  e.preventDefault();
  
  if (!selectedFiles.length) {
    alert('请先选择文件');
    return;
  }
  
  submitBtn.disabled = true;
  submitBtn.textContent = '上传中...';
  statusHint.textContent = '正在上传...';
  
  const fd = new FormData();
  for (const { file, path } of selectedFiles) {
    fd.append('files', file);
    fd.append('paths', path);
  }
  
  const targetPath = document.getElementById('targetPathInput').value.trim().replace(/\\/g, '/').replace(/^\/|\/$/g, '');
  fd.append('upload_path', targetPath);
  
  const xhr = new XMLHttpRequest();
  xhr.open('POST', form.action);
  
  xhr.upload.onprogress = e => {
    if (e.lengthComputable) {
      const pct = Math.round(e.loaded / e.total * 100);
      statusHint.textContent = '上传进度: ' + pct + '%';
    }
  };
  
  xhr.onload = () => {
    submitBtn.disabled = false;
    submitBtn.textContent = '开始上传';
    if (xhr.status === 200 || xhr.status === 302) {
      statusHint.textContent = '上传成功！';
      {% if current_path %}
      window.location.href = "{{ url_for('repo_view', repo_id=repo.id, subpath=current_path) }}";
      {% else %}
      window.location.href = "{{ url_for('repo_view', repo_id=repo.id) }}";
      {% endif %}
    } else {
      statusHint.textContent = '上传失败: ' + xhr.status;
      alert('上传失败: ' + xhr.status + ' ' + xhr.statusText + '\n' + xhr.responseText);
    }
  };
  
  xhr.onerror = () => {
    submitBtn.disabled = false;
    submitBtn.textContent = '开始上传';
    statusHint.textContent = '网络错误';
    alert('网络错误，请重试');
  };
  
  xhr.send(fd);
});

// 初始化
renderList();
</script>
{% endblock %}
