{% extends "base.html" %}
{% block title %}上传固件 - 固件管理系统{% endblock %}
{% block extra_css %}
<style>
.drop-zone {
    border: 2px dashed var(--gray-300);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--gray-50);
    position: relative;
}
.drop-zone:hover { border-color: var(--primary); background: var(--primary-light); }
.drop-zone.drag-over {
    border-color: var(--primary);
    background: var(--primary-light);
    box-shadow: 0 0 0 4px rgba(79,70,229,.15);
}
.drop-zone-icon { font-size: 3rem; margin-bottom: .5rem; opacity: .5; }
.drop-zone-text { color: var(--gray-500); font-size: .95rem; }
.drop-zone-text strong { color: var(--primary); }
.drop-zone-filename {
    margin-top: 1rem;
    padding: .6rem 1rem;
    background: #dcfce7;
    color: #166534;
    border-radius: var(--radius);
    font-size: .9rem;
    display: none;
}
.drop-zone-filename.show { display: block; }
.drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
}
</style>
{% endblock %}
{% block content %}
<div class="page-header">
    <h1>📤 上传固件</h1>
</div>

<form method="POST" enctype="multipart/form-data" class="form-card" id="uploadForm">
    <div class="form-group">
        <label for="name">固件名称 *</label>
        <input type="text" id="name" name="name" placeholder="如：ESP32 主控固件" required>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="version">版本号 *</label>
            <input type="text" id="version" name="version" placeholder="如：1.2.3" required>
        </div>
        <div class="form-group">
            <label for="release_type">发布类型</label>
            <select id="release_type" name="release_type">
                <option value="stable">稳定版 Stable</option>
                <option value="beta">测试版 Beta</option>
                <option value="alpha">开发版 Alpha</option>
            </select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="product_id">所属产品</label>
            <select id="product_id" name="product_id">
                <option value="">— 未分类 —</option>
                {% for p in products %}
                <option value="{{ p.id }}">{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="hardware_model">硬件型号</label>
            <input type="text" id="hardware_model" name="hardware_model" placeholder="如：ESP32-WROOM-32">
        </div>
    </div>
    <div class="form-group">
        <label for="description">描述</label>
        <textarea id="description" name="description" rows="4" placeholder="固件功能说明、更新日志…"></textarea>
    </div>
    <div class="form-group">
        <label>选择固件文件 *</label>
        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">📁</div>
            <div class="drop-zone-text">
                <strong>点击选择文件</strong> 或直接拖拽文件到这里
            </div>
            <div class="drop-zone-filename" id="fileName"></div>
            <input type="file" id="file" name="file" accept=".hex,.bin,.elf,.fw,.zip,.img" required>
        </div>
        <p class="file-hint" style="margin-top:.5rem;">支持格式：hex / bin / elf / fw / zip / img，单文件最大 500MB</p>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg">🚀 上传固件</button>
        <a href="{{ url_for('firmware_list') }}" class="btn btn-outline">取消</a>
    </div>
</form>
{% endblock %}
{% block extra_js %}
<script>
(function(){
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('file');
    const fileName = document.getElementById('fileName');

    function showFileName(name, size) {
        fileName.textContent = '✅ ' + name + ' (' + size + ')';
        fileName.classList.add('show');
    }

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
        return (bytes/1024/1024).toFixed(1) + ' MB';
    }

    dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            const f = e.dataTransfer.files[0];
            showFileName(f.name, formatSize(f.size));
        }
    });
    fileInput.addEventListener('change', e => {
        if (fileInput.files.length) {
            const f = fileInput.files[0];
            showFileName(f.name, formatSize(f.size));
        }
    });
})();
</script>
{% endblock %}
