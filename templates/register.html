{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>注册</h1>
    <form method="POST">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" name="username" placeholder="用户名" required autofocus>
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" name="email" placeholder="邮箱" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" placeholder="密码（至少6位）" required>
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" name="password2" placeholder="再次输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">注册</button>
    </form>
    <p class="auth-footer">已有账号？<a href="{{ url_for('login') }}">登录</a></p>
  </div>
</div>
{% endblock %}
